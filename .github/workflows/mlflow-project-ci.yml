name: Train MLflow Project and Build Docker Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  train-build-push:
    runs-on: ubuntu-latest
    env:
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install MLflow project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Run MLflow Project retraining
        run: |
          mlflow run MLProject --env-manager=local --experiment-name "Breast_Cancer_CI_MLProject"

      - name: Upload MLflow output artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mlflow-project-outputs
          path: MLProject/outputs/

      - name: Build Docker image using mlflow models build-docker
        run: |
          IMAGE_NAME="${DOCKER_IMAGE_NAME:-${{ secrets.DOCKERHUB_USERNAME }}/breast-cancer-mlflow:latest}"
          echo "Building $IMAGE_NAME"
          mlflow models build-docker             -m MLProject/outputs/model             -n "$IMAGE_NAME"             --enable-mlserver

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_NAME="${DOCKER_IMAGE_NAME:-${{ secrets.DOCKERHUB_USERNAME }}/breast-cancer-mlflow:latest}"
          docker push "$IMAGE_NAME"
