name: Train MLflow Project and Build Docker Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  train-build-push:
    runs-on: ubuntu-latest
    environment: breast-cancer-mlflow    

    env:
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      DOCKER_IMAGE_NAME: nifeto/breast-cancer-mlflow:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install MLflow project dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r MLProject/requirements.txt

      - name: Run MLflow Project retraining
        run: |
          mlflow run MLProject --env-manager=local --experiment-name "Breast_Cancer_CI_MLProject"

      - name: Inspect saved MLflow model environment
        run: |
          echo "=== MLProject/conda.yaml ==="
          cat MLProject/conda.yaml || true

          echo "=== MLProject/outputs/model/MLmodel ==="
          cat MLProject/outputs/model/MLmodel || true

          echo "=== MLProject/outputs/model/conda.yaml ==="
          cat MLProject/outputs/model/conda.yaml || true

          echo "=== MLProject/outputs/model/python_env.yaml ==="
          cat MLProject/outputs/model/python_env.yaml || true

          echo "=== Current Python ==="
          python --version

      - name: Upload MLflow output artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mlflow-project-outputs
          path: MLProject/outputs/

      - name: Validate Docker image name
        run: |
          if [ -z "$DOCKER_IMAGE_NAME" ]; then
            echo "DOCKER_IMAGE_NAME is empty"
            exit 1
          fi

          if [[ "$DOCKER_IMAGE_NAME" == /* ]]; then
            echo "Invalid Docker image name: $DOCKER_IMAGE_NAME"
            echo "Docker image name must not start with /"
            exit 1
          fi

          echo "Using Docker image: $DOCKER_IMAGE_NAME"

      - name: Build Docker image using mlflow models build-docker
        run: |
          echo "Building $DOCKER_IMAGE_NAME"

          mlflow models build-docker \
            -m MLProject/outputs/model \
            -n "$DOCKER_IMAGE_NAME" \
            --enable-mlserver \
            --env-manager=local

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        if: github.event_name != 'pull_request'
        run: |
          echo "Pushing $DOCKER_IMAGE_NAME"
          docker push "$DOCKER_IMAGE_NAME"